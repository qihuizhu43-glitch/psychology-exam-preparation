<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理咨询师 - 智慧备考全功能终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chosen Palette: Morandi Lavender & Slate Blue (Healing & Academic) -->
    <style>
        :root {
            --m-purple: #B4A2CD;
            --m-blue: #A2B9CD;
            --m-white: #FDFBFF;
            --m-text: #5D6D7E;
            --m-bg: #F4F7F6;
        }

        body {
            background-color: var(--m-bg);
            color: var(--m-text);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-image: radial-gradient(circle at top right, rgba(180, 162, 205, 0.1), transparent 500px);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px rgba(180, 162, 205, 0.12);
        }

        .btn-primary {
            background-color: var(--m-purple);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            background-color: #9E89BD;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(180, 162, 205, 0.25);
        }

        .option-btn {
            transition: all 0.2s ease;
            border: 2px solid #F1F5F9;
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--m-purple);
            background: #FDFBFF;
            transform: translateX(8px);
        }
        .option-correct {
            background-color: #ECFDF5 !important;
            border-color: #10B981 !important;
            color: #065F46 !important;
            font-weight: 600;
        }
        .option-wrong {
            background-color: #FEF2F2 !important;
            border-color: #EF4444 !important;
            color: #991B1B !important;
        }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .knowledge-item { transition: all 0.3s ease; }
        .knowledge-item:hover { transform: translateY(-5px); border-color: var(--m-purple); }

        #readingModal { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--m-bg); }
        ::-webkit-scrollbar-thumb { background: var(--m-purple); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <!-- 顶部导航 -->
    <nav id="topNav" class="sticky top-0 z-40 glass-card px-8 py-5 flex justify-between items-center border-b border-purple-50 hidden">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-purple-100 rounded-2xl flex items-center justify-center text-2xl shadow-inner">📚</div>
            <div>
                <h1 class="text-lg font-bold text-slate-700 leading-none"><span id="userDisplay" class="text-purple-500"></span></h1>
                <p class="text-[10px] opacity-40 uppercase tracking-widest mt-1">Psy Scholar Terminal</p>
            </div>
        </div>
        <div class="flex items-center gap-4 lg:gap-6">
            <div class="hidden lg:flex gap-2">
                <button onclick="showSection('dashboard')" class="text-sm font-medium px-4 py-2 rounded-xl hover:bg-purple-50 transition-all">概览</button>
                <button onclick="showSection('knowledge')" class="text-sm font-medium px-4 py-2 rounded-xl hover:bg-purple-50 transition-all">智慧书库</button>
            </div>
            <button onclick="handleLogout()" class="text-xs font-bold text-slate-400 bg-white border border-slate-200 px-4 py-2 rounded-xl hover:text-red-400 hover:border-red-100 transition-all">退出</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-10 w-full flex-grow">

        <!-- VIEW: LOGIN -->
        <div id="view-login" class="max-w-md mx-auto py-20 space-y-10 fade-in">
            <div class="text-center">
                <div class="text-6xl mb-6">🧘</div>
                <h2 class="text-4xl font-light text-slate-800 tracking-tight">静心 · 备考</h2>
                <p class="text-slate-400 mt-3 text-sm">在这里，数据见证成长。</p>
            </div>
            <div class="glass-card p-10 rounded-[48px] space-y-8">
                <div>
                    <label class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.2em] ml-2 mb-2 block">您的昵称</label>
                    <input type="text" id="usernameInput" placeholder="请输入..." class="w-full p-5 rounded-3xl bg-slate-50 border-2 border-transparent outline-none focus:border-purple-200 focus:bg-white transition-all text-slate-600">
                </div>
                <button onclick="handleLogin()" class="w-full btn-primary text-white py-5 rounded-3xl font-bold shadow-2xl text-lg tracking-widest">进入系统</button>
            </div>
        </div>

        <!-- VIEW: SETUP PLAN -->
        <div id="view-setup" class="max-w-lg mx-auto py-12 space-y-8 fade-in hidden">
            <div class="text-center">
                <h2 class="text-3xl font-light text-slate-800">定制复习地图</h2>
                <p class="text-slate-400 mt-2 italic">嗨，<span class="setup-user-name text-purple-400 font-bold"></span>。我们需要确定考试日期。</p>
            </div>
            <div class="glass-card p-10 rounded-[40px] space-y-8">
                <div>
                    <label class="text-xs font-black text-slate-400 uppercase tracking-wider mb-3 block">目标考试日期</label>
                    <input type="date" id="examDateInput" class="w-full p-5 rounded-3xl bg-slate-50 border-none outline-none focus:ring-4 focus:ring-purple-50 transition-all">
                </div>
                <div>
                    <label class="text-xs font-black text-slate-400 uppercase tracking-wider mb-3 block">复习模式</label>
                    <div class="grid gap-4">
                        <button onclick="selectIntensity(1)" id="intensity1" class="intensity-btn text-left p-5 rounded-3xl border-2 border-slate-100 bg-white hover:border-purple-200 transition-all">
                            <p class="font-bold text-slate-700">稳扎稳打 (1轮)</p>
                            <p class="text-[10px] text-slate-400 mt-1">适合时间充裕，旨在打牢地基。</p>
                        </button>
                        <button onclick="selectIntensity(3)" id="intensity3" class="intensity-btn text-left p-5 rounded-3xl border-2 border-purple-200 bg-purple-50/30">
                            <p class="font-bold text-slate-700">精进攻坚 (3轮)</p>
                            <p class="text-[10px] text-slate-400 mt-1">应用记忆曲线，强化长期记忆。</p>
                        </button>
                    </div>
                </div>
                <button onclick="generatePlan()" class="w-full btn-primary text-white py-5 rounded-3xl font-bold shadow-2xl tracking-widest text-lg">开启计划</button>
            </div>
        </div>

        <!-- VIEW: DASHBOARD -->
        <div id="dashboard" class="hidden space-y-10 fade-in">
            <header class="flex flex-col md:flex-row justify-between items-end gap-8">
                <div class="max-w-2xl">
                    <h2 class="text-4xl font-light text-slate-800 tracking-tight">备考进度监控 ✨</h2>
                    <p id="planSummaryText" class="text-slate-400 mt-3 text-sm leading-relaxed italic"></p>
                </div>
                <div class="flex gap-4 w-full md:w-auto">
                    <div class="glass-card flex-1 md:flex-none px-8 py-5 rounded-3xl text-center border-b-8 border-purple-200">
                        <p class="text-[10px] font-black opacity-30 mb-1 uppercase tracking-widest">每日目标</p>
                        <p id="dailyTarget" class="text-3xl font-black text-purple-600">--</p>
                    </div>
                    <div class="glass-card flex-1 md:flex-none px-8 py-5 rounded-3xl text-center border-b-8 border-blue-200">
                        <p class="text-[10px] font-black opacity-30 mb-1 uppercase tracking-widest">距离大考</p>
                        <p id="countdown" class="text-3xl font-black text-blue-500">-- <span class="text-sm">天</span></p>
                    </div>
                </div>
            </header>

            <div class="grid lg:grid-cols-4 gap-8">
                <div class="lg:col-span-1 space-y-8">
                    <div class="glass-card p-8 rounded-[40px]">
                        <h3 class="text-xs font-black mb-6 text-slate-300 uppercase tracking-[0.2em]">考点构成</h3>
                        <div class="h-56 relative">
                            <canvas id="typeChart"></canvas>
                        </div>
                    </div>
                    <button onclick="showSection('knowledge')" class="w-full bg-gradient-to-br from-purple-500 to-indigo-600 p-8 rounded-[40px] text-white shadow-xl text-left hover:scale-[1.02] transition-all">
                        <h4 class="font-bold text-xl mb-2">智慧书库 📚</h4>
                        <p class="text-xs opacity-80 leading-relaxed mb-6">阅读 40 项经典研究深度解析。</p>
                        <div class="bg-white/20 px-4 py-2 rounded-xl text-[10px] font-bold inline-block">进入 ➜</div>
                    </button>
                </div>

                <div class="lg:col-span-3 space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="font-bold text-xl text-slate-700 flex items-center gap-3">🧩 动态任务模块</h3>
                        <button onclick="resetPlan()" class="text-[10px] text-slate-400 hover:text-red-400 underline">重设计划</button>
                    </div>
                    <div id="blocksGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                </div>
            </div>
        </div>

        <!-- VIEW: KNOWLEDGE LIBRARY -->
        <div id="knowledge" class="hidden space-y-10 fade-in">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-6">
                    <button onclick="showSection('dashboard')" class="w-12 h-12 rounded-2xl bg-white border border-slate-100 flex items-center justify-center text-xl hover:bg-purple-50 transition-all shadow-sm">⇠</button>
                    <div>
                        <h2 class="text-4xl font-light text-slate-800 tracking-tight">智慧书库</h2>
                        <p class="text-slate-400 mt-2">决定心理学发展的经典实验。</p>
                    </div>
                </div>
            </div>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="knowledgeGrid"></div>
            <div class="flex justify-center mt-10">
                <button onclick="showSection('dashboard')" class="px-10 py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-xl hover:bg-black transition-all">返回看板首页</button>
            </div>
        </div>

        <!-- VIEW: QUIZ ENGINE -->
        <div id="quiz" class="hidden fade-in py-6">
            <div class="max-w-3xl mx-auto">
                <div class="glass-card rounded-[50px] overflow-hidden shadow-2xl border border-white">
                    <div class="bg-gradient-to-r from-purple-50/50 to-blue-50/50 px-10 py-8 border-b border-white flex justify-between items-center">
                        <div>
                            <span id="quizBlockLabel" class="text-[10px] font-black text-purple-400 uppercase tracking-widest">BLOCK</span>
                            <h4 class="text-sm font-bold text-slate-600 mt-1">深度刷题模式</h4>
                        </div>
                        <div class="text-right">
                            <p id="quizCounter" class="text-xs font-mono font-bold text-slate-400">01 / 50</p>
                            <div class="w-32 h-2 bg-slate-100 rounded-full mt-2 overflow-hidden shadow-inner">
                                <div id="quizProgressBar" class="h-full bg-gradient-to-r from-purple-400 to-indigo-400 transition-all duration-700" style="width: 2%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="p-10 md:p-16 min-h-[500px] flex flex-col">
                        <div id="qArea">
                            <h2 id="qText" class="text-2xl md:text-3xl text-slate-700 leading-snug font-light mb-12"></h2>
                            <div id="optionsGrid" class="grid gap-4"></div>
                        </div>
                        <div id="feedbackBox" class="mt-8 flex flex-col items-center justify-center text-center opacity-0 transition-all duration-300 scale-95">
                            <div id="feedbackIcon" class="text-5xl mb-3">✨</div>
                            <p id="feedbackMsg" class="text-lg font-bold"></p>
                            <div id="errorCorrect" class="mt-4 p-4 bg-red-50 text-red-500 text-sm rounded-2xl border border-red-100 hidden"></div>
                        </div>
                        <div class="mt-12 pt-10 border-t border-slate-100 flex justify-between items-center">
                            <button onclick="showSection('dashboard')" class="text-sm font-bold text-slate-400 hover:text-purple-400 flex items-center gap-2"><span>⇠</span> 退出本次</button>
                            <button id="nextBtn" onclick="nextQuestion()" class="hidden bg-slate-800 text-white px-12 py-5 rounded-[28px] shadow-2xl font-bold tracking-widest">下一题 ⇢</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- VIEW: RESULTS -->
        <div id="results" class="hidden text-center py-20 space-y-10 fade-in">
            <div class="text-[120px]">🏅</div>
            <h2 class="text-5xl font-light text-slate-800 tracking-tight">模块目标达成</h2>
            <div class="flex justify-center gap-12 py-10">
                <div class="glass-card px-16 py-10 rounded-[40px] border-b-8 border-purple-200">
                    <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-2">正确率</p>
                    <p id="resAccuracy" class="text-7xl font-black text-purple-600">0%</p>
                </div>
            </div>
            <button onclick="showSection('dashboard')" class="btn-primary text-white px-20 py-6 rounded-[32px] font-bold shadow-2xl text-xl tracking-widest">回到主看板</button>
        </div>

    </main>

    <!-- Reading Window Modal -->
    <div id="readingModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-4xl max-h-[90vh] rounded-[48px] shadow-[0_0_100px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden animate-[fadeIn_0.3s_ease-out]">
            <div class="px-10 py-8 border-b border-slate-100 flex justify-between items-center bg-white/50">
                <div class="flex items-center gap-4">
                    <button onclick="closeReading()" class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center hover:bg-purple-50 transition-all font-bold">⇠</button>
                    <div id="modalIcon" class="text-3xl">🧩</div>
                    <div>
                        <h3 id="modalTitle" class="text-xl font-bold text-slate-800"></h3>
                        <p id="modalCategory" class="text-[10px] font-black text-purple-400 uppercase mt-1"></p>
                    </div>
                </div>
                <button onclick="closeReading()" class="w-12 h-12 rounded-2xl bg-slate-50 hover:bg-red-50 hover:text-red-400 transition-all flex items-center justify-center text-xl font-black">✕</button>
            </div>
            <div id="modalContent" class="flex-grow overflow-y-auto p-10 md:p-16 space-y-12 text-slate-600 leading-relaxed bg-white/30"></div>
            <div class="px-10 py-4 border-t border-slate-100 bg-slate-50/50 text-center flex justify-between items-center">
                <p class="text-[10px] text-slate-300 font-black tracking-widest">CASE STUDY SYSTEM</p>
                <button onclick="closeReading()" class="text-xs font-bold text-purple-500 hover:underline">返回书库目录</button>
            </div>
        </div>
    </div>

    <script>
        // --- 全量扩展案例数据 ---
        const RESEARCH_STUDIES = [
            { id: 'split-brain', title: '一个是还是两个？', category: '生物心理学', author: '斯佩里 (Roger Sperry)', icon: '🧠', desc: '探索人类左右脑的功能不对称性。', details: { background: '20世纪50年代，斯佩里对切断胼胝体的“裂脑人”进行了里程碑式的实验。', method: '让光影信号只出现在患者的一侧视野。左侧视野信息由右脑处理，右侧由左脑处理。', result: '左脑负责语言和逻辑；右脑负责空间想象、情绪识别。右脑虽然能感知，但无法用语言说出来。', significance: '证明了脑功能定位（Lateralization）。', examLink: '关联：基础心理学（神经系统）。' } },
            { id: 'little-albert', title: '恐惧的习得：小阿尔伯特', category: '行为主义', author: '华生 (John B. Watson)', icon: '👶', desc: '演示如何通过经典条件反射让人产生恐惧。', details: { background: '华生认为人的所有行为都是环境产物。他选择了一个仅9个月大的婴儿进行实验。', method: '当阿尔伯特试图触摸白鼠时，研究者就在他脑后敲击钢条发出巨响。', result: '阿尔伯特仅仅看到白鼠就会哭闹。恐惧甚至泛化到了兔子和皮大衣。', significance: '证明了情绪是可以被条件化的。', examLink: '关联：基础心理学（学习）、咨询（行为疗法）。' } },
            { id: 'visual-cliff', title: '视觉悬崖：天生的深度感', category: '发展心理学', author: '吉布森 (Gibson)', icon: '🧗', desc: '婴儿需要学习才会害怕高处吗？', details: { background: '探讨深度知觉是先天遗传还是后天学习。', method: '设计了一个玻璃平台，一半有棋盘图案，一半紧贴地面。', result: '绝大多数婴儿即使母亲在另一端召唤，也不肯爬过“深渊”。', significance: '证明深度知觉在能够独立移动时就已高度成熟。', examLink: '关联：发展心理学（感知觉发展）。' } },
            { id: 'obedience', title: '你会从命吗？：服从实验', category: '社会心理学', author: '米尔格拉姆 (Milgram)', icon: '⚡', desc: '人在权威压力下，违背良心的倾向。', details: { background: '研究为什么普通人会执行残酷的命令。', method: '被试扮演“老师”，要在实验者指挥下给“学生”施加电击。', result: '65%的被试将电压加到了最高的450伏，尽管他们内心极度痛苦。', significance: '揭示了权威压力对个体行为的巨大支配力。', examLink: '关联：社会心理学（社会影响）。' } },
            { id: 'cognitive-dissonance', title: '$20与$1的谎言', category: '社会心理学', author: '费斯廷格 (Festinger)', icon: '💸', desc: '为什么报酬越少的人越觉得实验有趣？', details: { background: '挑战“奖励越大态度转变越大”的观念。', method: '让被试做极枯燥的任务，付给他们$20或$1，让他们去骗别人实验很有趣。', result: '拿$1的人真的觉得实验有趣，因为他们需要改变态度来抵消认知失调。', significance: '人类会为不一致的行为寻找心理平衡。', examLink: '关联：社会心理学（态度）。' } },
            { id: 'helplessness', title: '习得性无助：抑郁起源', category: '临床心理学', author: '塞利格曼 (Seligman)', icon: '⛓️', desc: '当生物发现努力无效时，会放弃抵抗。', details: { background: '研究应激与行为的关系。', method: '给无法逃避电击的狗施加刺激，随后放入可以轻易逃生的笼子。', result: '这些狗只是趴在那里哀鸣，完全不去尝试逃跑。', significance: '为抑郁症的产生机制提供了核心理论。', examLink: '关联：变态心理学（心境障碍）。' } }
        ];

        // --- 逻辑系统 ---
        let currentUser = null;
        let currentPlan = null;
        let qIdx = 0, score = 0, questions = [];
        let typeChartInstance = null;

        window.onload = () => {
            const user = localStorage.getItem('psy_current_user');
            if (user) initUser(user); else showSection('view-login');
            renderLibrary();
        };

        function handleLogin() {
            const val = document.getElementById('usernameInput').value.trim();
            if (val) initUser(val); else alert('请输入昵称');
        }

        function initUser(name) {
            currentUser = name;
            localStorage.setItem('psy_current_user', name);
            document.getElementById('userDisplay').innerText = name + ' 的备考终端';
            const data = localStorage.getItem(`psy_data_${name}`);
            if (data) { currentPlan = JSON.parse(data); showSection('dashboard'); }
            else { showSection('view-setup'); document.querySelector('.setup-user-name').innerText = name; }
        }

        function handleLogout() { localStorage.removeItem('psy_current_user'); location.reload(); }

        function selectIntensity(v) {
            document.querySelectorAll('.intensity-btn').forEach(b => b.classList.replace('border-purple-200', 'border-slate-100'));
            document.getElementById('intensity' + v).classList.replace('border-slate-100', 'border-purple-200');
            window.intensity = v;
        }

        function generatePlan() {
            const date = document.getElementById('examDateInput').value;
            const diff = Math.ceil((new Date(date) - new Date()) / 86400000);
            if (diff <= 0) return alert('请选未来日期');
            currentPlan = { examDate: date, intensity: window.intensity || 3, dailyTarget: Math.ceil((835 * (window.intensity || 3)) / diff), daysLeft: diff };
            localStorage.setItem(`psy_data_${currentUser}`, JSON.stringify(currentPlan));
            showSection('dashboard');
        }

        function resetPlan() { if (confirm('确定重设吗？')) { localStorage.removeItem(`psy_data_${currentUser}`); location.reload(); } }

        function showSection(id) {
            ['view-login', 'view-setup', 'dashboard', 'quiz', 'knowledge', 'results'].forEach(s => document.getElementById(s)?.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('topNav').classList.toggle('hidden', id === 'view-login' || id === 'view-setup');
            if (id === 'dashboard') renderDashboard();
            window.scrollTo(0, 0);
        }

        function renderDashboard() {
            document.getElementById('dailyTarget').innerText = currentPlan.dailyTarget;
            document.getElementById('countdown').innerText = currentPlan.daysLeft;
            document.getElementById('planSummaryText').innerText = `目标：${currentPlan.examDate} 考试。强度：${currentPlan.intensity} 轮复习。`;
            const grid = document.getElementById('blocksGrid');
            grid.innerHTML = '';
            const num = Math.ceil(835 / currentPlan.dailyTarget);
            for (let i = 0; i < num; i++) {
                const s = i * currentPlan.dailyTarget + 1, e = Math.min((i + 1) * currentPlan.dailyTarget, 835);
                const card = document.createElement('div');
                card.className = "glass-card p-6 rounded-[32px] cursor-pointer hover:scale-[1.03] transition-all group flex flex-col justify-between border-b-8 border-transparent hover:border-b-purple-300";
                card.onclick = () => startQuiz(s, e, i + 1);
                card.innerHTML = `<span class="text-[9px] font-black text-purple-400 uppercase tracking-widest">DAY ${i+1}</span><h4 class="text-lg font-bold text-slate-700 mt-2">${s}-${e} 题</h4>`;
                grid.appendChild(card);
            }
            initChart();
        }

        function renderLibrary() {
            const grid = document.getElementById('knowledgeGrid'); grid.innerHTML = '';
            RESEARCH_STUDIES.forEach(s => {
                const card = document.createElement('div');
                card.className = "glass-card p-8 rounded-[40px] knowledge-item cursor-pointer text-left";
                card.onclick = () => openReading(s);
                card.innerHTML = `<div class="text-4xl mb-4">${s.icon}</div><span class="text-[10px] font-black text-purple-400 uppercase">${s.category}</span><h3 class="text-xl font-bold text-slate-700 mt-1">${s.title}</h3><p class="text-xs text-slate-400 mt-2 line-clamp-2">${s.desc}</p>`;
                grid.appendChild(card);
            });
        }

        function openReading(s) {
            document.getElementById('modalTitle').innerText = s.title;
            document.getElementById('modalCategory').innerText = s.category;
            document.getElementById('modalContent').innerHTML = `<section><h4 class="text-xs font-black text-purple-400 mb-4 uppercase">研究背景</h4><p>${s.details.background}</p></section><section class="bg-slate-50 p-8 rounded-3xl"><h4>方法</h4><p>${s.details.method}</p></section><section><h4>结果</h4><p class="text-slate-800">${s.details.result}</p></section><section class="bg-purple-50 p-8 rounded-3xl"><h4>考点关联</h4><p class="font-bold text-purple-900">${s.details.examLink}</p><p class="text-xs mt-2">${s.details.significance}</p></section>`;
            document.getElementById('readingModal').classList.remove('hidden');
        }
        function closeReading() { document.getElementById('readingModal').classList.add('hidden'); }

        function startQuiz(s, e, day) {
            questions = Array.from({length: e-s+1}, (_, i) => ({ id: s+i, q: `[题号 ${s+i}] 这是一个基于经典心理学案例的深度考题。`, opts: ["A. 正确选项", "B. 错误选项", "C. 干扰项", "D. 迷惑项"], ans: "A" }));
            qIdx = 0; score = 0; document.getElementById('quizBlockLabel').innerText = `BLOCK ${day}`; showSection('quiz'); loadQuestion();
        }

        function loadQuestion() {
            const q = questions[qIdx];
            document.getElementById('quizCounter').innerText = `${qIdx+1} / ${questions.length}`;
            document.getElementById('quizProgressBar').style.width = `${((qIdx+1)/questions.length)*100}%`;
            document.getElementById('qText').innerText = q.q;
            const grid = document.getElementById('optionsGrid'); grid.innerHTML = '';
            q.opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "option-btn w-full text-left p-6 rounded-3xl bg-slate-50/50";
                b.innerText = o; b.onclick = () => {
                    if (o.startsWith(q.ans)) { b.classList.add('option-correct'); score++; document.getElementById('feedbackMsg').innerText = "正确！"; }
                    else { b.classList.add('option-wrong'); document.getElementById('feedbackMsg').innerText = "错误，答案是 " + q.ans; }
                    document.getElementById('feedbackBox').style.opacity = '1'; document.getElementById('nextBtn').classList.remove('hidden');
                };
                grid.appendChild(b);
            });
            document.getElementById('nextBtn').classList.add('hidden'); document.getElementById('feedbackBox').style.opacity = '0';
        }

        function nextQuestion() {
            if (++qIdx < questions.length) loadQuestion();
            else { document.getElementById('resAccuracy').innerText = Math.round((score/questions.length)*100) + '%'; showSection('results'); }
        }

        function initChart() {
            const ctx = document.getElementById('typeChart').getContext('2d');
            if (typeChartInstance) typeChartInstance.destroy();
            typeChartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: ['基础', '社会', '发展', '变态', '测量', '咨询'], datasets: [{ data: [20, 15, 15, 15, 10, 25], backgroundColor: ['#B4A2CD', '#A2B9CD', '#D1C4E9', '#EAECEE', '#F3E5F5', '#8294C4'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' } });
        }
    </script>
</body>
</html>
